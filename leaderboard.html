<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

h1{
  text-align:center;
}

.note{
  text-align:center;
  color:#777;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{
  background:#0078d4;
  color:white;
}

tr:hover{
  background:#f5f5f5;
}

.top1{ background:#fff3cd; }
.top2{ background:#e2e3e5; }
.top3{ background:#f8d7da; }

.loading{
  text-align:center;
  padding:20px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🏆 Leaderboard</h1>
  <p class="note">Live results from Google Sheet</p>

  <div id="board" class="loading">Loading...</div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxRoAPOMPCP4tQ3gg7myNwMTOph620Yn2SHp4GlVnel6tDm2b6zIpRM1rmmLeUpaHvB/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  let html = `
    <table>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Score</th>
        <th>Time (sec)</th>
      </tr>
  `;

  data.forEach((d,i) => {

    let cls = "";
    if(i === 0) cls = "top1";
    else if(i === 1) cls = "top2";
    else if(i === 2) cls = "top3";

    html += `
      <tr class="${cls}">
        <td>${i+1}</td>
        <td>${d.name}</td>
        <td>${d.score}</td>
        <td>${d.time}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("board").innerHTML = html;

})
.catch(err => {
  document.getElementById("board").innerHTML = "❌ Failed to load leaderboard";
  console.error(err);
});

</script>

</body>
</html>
