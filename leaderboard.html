<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  padding:20px;
}
.container{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}
h1{text-align:center;}

.item{
  padding:12px;
  border-bottom:1px solid #ddd;
}

.rank{
  font-weight:bold;
  font-size:18px;
}

.top1{background:#fff3cd;}
.top2{background:#e2e3e5;}
.top3{background:#f8d7da;}
</style>

</head>

<body>

<div class="container">
  <h1>🏆 Leaderboard</h1>
  <div id="list"></div>
</div>

<script>

fetch("https://script.google.com/macros/s/AKfycbyl0qDVqN76bSG56H9-qjiHE46cXsXwtl8mM3K8BCU67FzngwV_Wns94FMsAqCAokll/exec")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.slice(0,10).forEach((u,i)=>{

      let cls = "";
      if(i==0) cls="top1";
      else if(i==1) cls="top2";
      else if(i==2) cls="top3";

      html += `
        <div class="item ${cls}">
          <span class="rank">${i+1}. ${u.name}</span><br>
          Score: ${u.score} / 12 <br>
          Time: ${u.time} sec
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  });

</script>

</body>
</html>
